<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Бюджет">
<meta name="theme-color" content="#0f0f1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Семейный бюджет</title>
<style>
:root {
  --bg:      #0f0f1a;
  --surface: #1a1a2e;
  --card:    #16213e;
  --border:  #2a2a4a;
  --accent:  #7c6ff7;
  --accent2: #a78bfa;
  --green:   #34d399;
  --red:     #f87171;
  --yellow:  #fbbf24;
  --text:    #f0f0ff;
  --muted:   #8888aa;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
  overscroll-behavior: none;
}

/* ── LAYOUT ── */
.app { display: flex; flex-direction: column; height: 100%; }

.header {
  background: var(--surface);
  padding: calc(var(--safe-top) + 14px) 18px 0;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.header-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.header-title span { color: var(--accent2); }

.month-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 6px 12px;
}
.month-pill select {
  background: none; border: none; color: var(--accent2);
  font-size: 13px; font-weight: 700; outline: none; cursor: pointer;
  appearance: none; -webkit-appearance: none;
}
.month-arrow { color: var(--accent2); font-size: 10px; pointer-events: none; }

.nav {
  display: flex; gap: 2px;
  background: var(--card); border-radius: 12px; padding: 3px;
  margin-bottom: -1px;
}
.nav-btn {
  flex: 1; padding: 8px 0; border-radius: 10px; border: none;
  background: transparent; color: var(--muted);
  font-size: 11px; font-weight: 600; cursor: pointer;
  transition: all 0.2s; letter-spacing: 0.2px;
}
.nav-btn.active {
  background: var(--accent); color: #fff; font-weight: 800;
  box-shadow: 0 2px 12px rgba(124,111,247,0.4);
}

.main {
  flex: 1; overflow-y: auto;
  padding: 16px 16px calc(var(--safe-bot) + 16px);
  -webkit-overflow-scrolling: touch;
}

/* ── CARDS ── */
.card {
  background: var(--card); border-radius: 18px;
  border: 1px solid var(--border);
  padding: 18px; margin-bottom: 14px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}
.card-label {
  font-size: 11px; font-weight: 700; color: var(--muted);
  letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 14px;
}

/* ── KPI STRIP ── */
.kpi-row { display: flex; gap: 10px; margin-bottom: 14px; }
.kpi {
  flex: 1; background: var(--card); border-radius: 16px;
  border: 1px solid var(--border); padding: 14px 12px;
}
.kpi-lbl { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; margin-bottom: 5px; }
.kpi-val { font-size: 17px; font-weight: 900; }
.kpi-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* ── CATEGORY GRID ── */
.cat-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  margin-bottom: 18px;
}
.cat-btn {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 10px 6px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; transition: all 0.15s; color: var(--muted);
  font-size: 10px; font-weight: 600; text-align: center; line-height: 1.3;
  -webkit-user-select: none; user-select: none;
}
.cat-btn .cat-emoji { font-size: 22px; }
.cat-btn.active {
  background: rgba(124,111,247,0.15); border-color: var(--accent);
  color: var(--accent2); box-shadow: 0 0 0 3px rgba(124,111,247,0.15);
}
.cat-btn:active { transform: scale(0.94); }

/* ── AMOUNT INPUT ── */
.amount-wrap { margin-bottom: 14px; }
.amount-display {
  width: 100%; background: var(--surface); border: 2px solid var(--border);
  border-radius: 16px; padding: 18px;
  font-size: 32px; font-weight: 900; color: var(--text);
  text-align: center; letter-spacing: -1px;
  transition: border-color 0.2s;
}
.amount-display.has-value { border-color: var(--accent); color: var(--accent2); }
.amount-input-real {
  width: 100%; opacity: 0; height: 0; position: absolute;
}

/* ── NUMPAD ── */
.numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.num-btn {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 8px;
  font-size: 20px; font-weight: 700; color: var(--text);
  cursor: pointer; text-align: center; transition: all 0.12s;
  -webkit-user-select: none;
}
.num-btn:active { background: var(--accent); transform: scale(0.95); }
.num-btn.del { font-size: 18px; color: var(--red); }
.num-btn.dot { color: var(--muted); }

/* ── SUBMIT BTN ── */
.btn-main {
  width: 100%; padding: 16px; border-radius: 16px; border: none;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  color: #fff; font-size: 16px; font-weight: 800;
  cursor: pointer; letter-spacing: 0.3px;
  box-shadow: 0 4px 20px rgba(124,111,247,0.4);
  transition: all 0.15s;
}
.btn-main:active { transform: scale(0.97); opacity: 0.9; }
.btn-main:disabled { opacity: 0.4; }

/* ── LOG ── */
.log-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.log-item:last-child { border-bottom: none; }
.log-cat { font-size: 14px; font-weight: 700; color: var(--text); }
.log-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
.log-amount { font-size: 16px; font-weight: 900; color: var(--red); }
.log-del {
  background: none; border: none; color: var(--border);
  font-size: 18px; cursor: pointer; padding: 0 4px 0 10px;
  transition: color 0.15s;
}
.log-del:active { color: var(--red); }

/* ── PROGRESS BARS ── */
.prog-wrap { margin-bottom: 12px; }
.prog-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
.prog-name { color: var(--muted); font-weight: 600; }
.prog-val { font-weight: 800; }
.prog-bg { height: 6px; background: var(--surface); border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }

/* ── INCOME FIELDS ── */
.field-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.field-row:last-child { border-bottom: none; }
.field-lbl { font-size: 13px; font-weight: 600; color: var(--text); }
.field-inp {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 8px 12px; font-size: 14px; font-weight: 700;
  color: var(--text); text-align: right; width: 130px; outline: none;
  transition: border-color 0.2s;
}
.field-inp:focus { border-color: var(--accent); }

/* ── SYNC BTN ── */
.btn-sync {
  width: 100%; padding: 14px; border-radius: 14px; border: none;
  background: var(--surface); border: 1.5px solid var(--accent);
  color: var(--accent2); font-size: 14px; font-weight: 800;
  cursor: pointer; margin-top: 6px; transition: all 0.15s;
  letter-spacing: 0.3px;
}
.btn-sync:active { background: rgba(124,111,247,0.15); }
.sync-note { font-size: 11px; color: var(--muted); text-align: center; margin-top: 8px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(var(--safe-bot) + 20px); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text); color: var(--bg);
  padding: 11px 22px; border-radius: 30px;
  font-size: 13px; font-weight: 700;
  opacity: 0; transition: all 0.3s; z-index: 200;
  white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── BALANCE CARD ── */
.balance-big {
  font-size: 38px; font-weight: 900; letter-spacing: -2px;
  text-align: center; padding: 8px 0 4px;
}
.balance-label { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 16px; }

/* ── SUMMARY TABLE ── */
.sum-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 0; border-bottom: 1px solid var(--border);
}
.sum-row:last-child { border-bottom: none; }
.sum-lbl { font-size: 13px; color: var(--muted); }
.sum-val { font-size: 14px; font-weight: 800; }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 6px 0 14px; }

/* ── CHIP ── */
.chip {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
}

/* ── EMPTY ── */
.empty { text-align: center; padding: 36px 20px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }

/* ── SECTION HEAD ── */
.section-head {
  font-size: 11px; font-weight: 700; color: var(--accent);
  letter-spacing: 1px; text-transform: uppercase;
  margin: 18px 0 10px;
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="header-title">Семейный <span>бюджет</span></div>
      <div class="month-pill">
        <select id="month-sel" onchange="onMonthChange()">
          <option value="0">Январь</option><option value="1">Февраль</option>
          <option value="2">Март</option><option value="3">Апрель</option>
          <option value="4">Май</option><option value="5">Июнь</option>
          <option value="6" selected>Июль</option><option value="7">Август</option>
          <option value="8">Сентябрь</option><option value="9">Октябрь</option>
          <option value="10">Ноябрь</option><option value="11">Декабрь</option>
        </select>
        <span class="month-arrow">▾</span>
      </div>
    </div>
    <div class="nav">
      <button class="nav-btn active" onclick="gotoTab('add',this)">+ Трата</button>
      <button class="nav-btn" onclick="gotoTab('overview',this)">Итоги</button>
      <button class="nav-btn" onclick="gotoTab('income',this)">Доходы</button>
      <button class="nav-btn" onclick="gotoTab('log',this)">Журнал</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const APPS_SCRIPT_URL = 'ВСТАВЬ_URL_APPS_SCRIPT_СЮДА';
const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                 'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MONTH_COLS = ['D','E','F','G','H','I','J','K','L','M','N','O'];

// ══════════════════════════════════════════
// КАТЕГОРИИ
// ══════════════════════════════════════════
const CATS = [
  { name:'Покупка продуктов', e:'🛒' },
  { name:'Фастфуд',           e:'🍔' },
  { name:'Питание (кафе)',     e:'🍽' },
  { name:'Кофе',              e:'☕' },
  { name:'Бары/рестораны',    e:'🍷' },
  { name:'Спорт и красота',   e:'💪' },
  { name:'Аптеки',            e:'💊' },
  { name:'Одежда и обувь',    e:'👟' },
  { name:'Образование',       e:'📚' },
  { name:'АМ, КБ',            e:'🏦' },
  { name:'Развлечения',       e:'🎮' },
  { name:'Животные',          e:'🐾' },
  { name:'Путешествия',       e:'✈️' },
  { name:'Автомобиль',        e:'🚗' },
  { name:'Мотоцикл',          e:'🏍' },
  { name:'АЗС',               e:'⛽' },
  { name:'Штрафы',            e:'🚨' },
  { name:'Парковки',          e:'🅿️' },
  { name:'Транспорт',         e:'🚇' },
  { name:'Связь/интернет',    e:'📱' },
  { name:'Маркетплейсы',      e:'📦' },
  { name:'Хобби',             e:'🎯' },
  { name:'Бизнес',            e:'💼' },
  { name:'Ипотека',           e:'🏠' },
  { name:'ЖКХ',               e:'💡' },
  { name:'Ремонт квартиры',   e:'🔨' },
  { name:'Зарплата жены',     e:'👩' },
  { name:'Беременность/ребёнок', e:'👶' },
  { name:'Непредвиденные',    e:'⚡' },
  { name:'Нежелательные',     e:'🚫' },
];

const INCOME_CATS  = ['Зарплата','Доп. доход','А','Из вклада'];
const SAVINGS_CATS = ['Отложил на ПДС','Накопит. счёт','Инвестировал'];

const PLANS = {
  'Покупка продуктов':20000,'Фастфуд':5000,'Питание (кафе)':7000,
  'Кофе':3000,'Бары/рестораны':5000,'Спорт и красота':3000,
  'Аптеки':1000,'Одежда и обувь':3000,'Маркетплейсы':3000,
  'Хобби':3000,'Автомобиль':5000,'АЗС':5000,'Ипотека':80000,
  'Связь/интернет':1500,'Транспорт':1500,'Парковки':1000,
};

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let currentMonth = 6; // Июль
let activeTab = 'add';
let selectedCat = null;
let amountStr = '';

let state = { expenses:{}, income:{}, savings:{}, deposit:{} };

function mk() { return `2026-${String(currentMonth+1).padStart(2,'0')}`; }
function loadState() {
  try { const r = localStorage.getItem('budget_pwa_v1'); if(r) state = JSON.parse(r); } catch(e){}
}
function saveState() {
  try { localStorage.setItem('budget_pwa_v1', JSON.stringify(state)); } catch(e){}
}
function getExp(m) { return state.expenses[m] || []; }
function getInc(m) { return state.income[m] || {}; }
function getSav(m) { return state.savings[m] || {}; }
function totalExp(m) { return getExp(m).reduce((s,e)=>s+e.amount,0); }
function totalInc(m) { return Object.values(getInc(m)).reduce((s,v)=>s+(+v||0),0); }
function totalSav(m) { return Object.values(getSav(m)).reduce((s,v)=>s+(+v||0),0); }
function byCat(m,c) { return getExp(m).filter(e=>e.cat===c).reduce((s,e)=>s+e.amount,0); }

function fmt(n) {
  const v = Math.abs(+n);
  const s = v >= 1000000 ? (v/1000000).toFixed(2)+' млн'
           : v >= 1000   ? (v/1000).toFixed(0)+' тыс'
           : v.toLocaleString('ru-RU');
  return (n < 0 ? '−' : '') + s + ' ₽';
}
function fmtFull(n) { return Math.abs(+n).toLocaleString('ru-RU') + ' ₽'; }
function fmtTime(iso) {
  const d = new Date(iso);
  return `${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)}, ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ══════════════════════════════════════════
// ROUTING
// ══════════════════════════════════════════
function gotoTab(tab, el) {
  activeTab = tab; selectedCat = null; amountStr = '';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}
function onMonthChange() {
  currentMonth = +document.getElementById('month-sel').value;
  selectedCat = null; amountStr = '';
  render();
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render() {
  const m = mk();
  const el = document.getElementById('main');
  if (activeTab==='add')      el.innerHTML = renderAdd(m);
  if (activeTab==='overview') el.innerHTML = renderOverview(m);
  if (activeTab==='income')   el.innerHTML = renderIncome(m);
  if (activeTab==='log')      el.innerHTML = renderLog(m);
}

// ── ADD ──────────────────────────────────
function renderAdd(m) {
  const grid = CATS.map(c=>`
    <button class="cat-btn ${selectedCat===c.name?'active':''}"
      onclick="selCat('${c.name}')">
      <span class="cat-emoji">${c.e}</span>${c.name}
    </button>`).join('');

  const disp = amountStr ? fmtFull(+amountStr) : '0 ₽';
  const hasVal = amountStr.length > 0;

  return `
  <div class="card">
    <div class="card-label">Категория ${selectedCat?'<span style="color:var(--accent2)">✓ '+selectedCat+'</span>':''}</div>
    <div class="cat-grid">${grid}</div>
  </div>

  <div class="card">
    <div class="card-label">Сумма</div>
    <div class="amount-wrap">
      <div class="amount-display ${hasVal?'has-value':''}">${disp}</div>
    </div>
    <div class="numpad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`
        <button class="num-btn" onclick="numPress('${n}')">${n}</button>`).join('')}
      <button class="num-btn dot" onclick="numPress('.')">•</button>
      <button class="num-btn" onclick="numPress('0')">0</button>
      <button class="num-btn del" onclick="numDel()">⌫</button>
    </div>
    <button class="btn-main" onclick="addExpense()"
      ${!selectedCat||!hasVal?'disabled':''}>
      ${selectedCat ? `Записать · ${selectedCat}` : 'Выбери категорию ↑'}
    </button>
  </div>`;
}

function selCat(name) {
  selectedCat = selectedCat === name ? null : name;
  render();
}
function numPress(v) {
  if (v==='.' && amountStr.includes('.')) return;
  if (amountStr.length >= 10) return;
  amountStr += v;
  render();
}
function numDel() {
  amountStr = amountStr.slice(0,-1);
  render();
}
function addExpense() {
  if (!selectedCat || !amountStr) return;
  const amount = parseFloat(amountStr);
  if (!amount || amount <= 0) return;
  const m = mk();
  if (!state.expenses[m]) state.expenses[m] = [];
  state.expenses[m].push({ cat: selectedCat, amount, time: new Date().toISOString() });
  saveState();
  amountStr = '';
  selectedCat = null;
  toast(`✓ ${fmtFull(amount)} → ${state.expenses[m][state.expenses[m].length-1].cat}`);
  render();
  if (navigator.vibrate) navigator.vibrate(30);
}

// ── OVERVIEW ─────────────────────────────
function renderOverview(m) {
  const exp = totalExp(m);
  const inc = totalInc(m);
  const sav = totalSav(m);
  const bal = inc - exp - sav;

  const catMap = {};
  getExp(m).forEach(e=>{ catMap[e.cat]=(catMap[e.cat]||0)+e.amount; });
  const sorted = Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const bars = sorted.map(([cat,amt])=>{
    const plan = PLANS[cat]||5000;
    const pct = Math.min(amt/plan*100,100);
    const over = amt > plan;
    return `
    <div class="prog-wrap">
      <div class="prog-header">
        <span class="prog-name">${CATS.find(c=>c.name===cat)?.e||'•'} ${cat}</span>
        <span class="prog-val" style="color:${over?'var(--red)':'var(--green)'}">${fmtFull(amt)}</span>
      </div>
      <div class="prog-bg">
        <div class="prog-fill" style="width:${pct}%;background:${over?'var(--red)':'var(--accent)'}"></div>
      </div>
    </div>`;
  }).join('') || '<div class="empty"><div class="empty-icon">📊</div>Трат пока нет</div>';

  return `
  <div class="balance-big" style="color:${bal>=0?'var(--green)':'var(--red)'}">
    ${bal>=0?'+':''}${fmt(bal)}
  </div>
  <div class="balance-label">остаток · ${MONTHS[currentMonth]} 2026</div>

  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-lbl">Расходы</div>
      <div class="kpi-val" style="color:var(--red)">${fmt(exp)}</div>
      <div class="kpi-sub">${getExp(m).length} трат</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">Доходы</div>
      <div class="kpi-val" style="color:var(--green)">${fmt(inc)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">Отложено</div>
      <div class="kpi-val" style="color:var(--accent2)">${fmt(sav)}</div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">По категориям</div>
    ${bars}
  </div>

  <div class="card">
    <div class="card-label">Итоговая сводка</div>
    ${[
      ['Доходы',     inc,  'var(--green)'],
      ['Расходы',    exp,  'var(--red)'],
      ['Накоплено',  sav,  'var(--accent2)'],
      ['Баланс',     bal,  bal>=0?'var(--green)':'var(--red)'],
    ].map(([l,v,c])=>`
      <div class="sum-row">
        <span class="sum-lbl">${l}</span>
        <span class="sum-val" style="color:${c}">${fmtFull(v)} ₽</span>
      </div>`).join('')}
  </div>`;
}

// ── INCOME ───────────────────────────────
function renderIncome(m) {
  const inc = getInc(m);
  const sav = getSav(m);
  const dep = state.deposit[m] || '';

  const incFields = INCOME_CATS.map(c=>`
    <div class="field-row">
      <span class="field-lbl">${c}</span>
      <input class="field-inp" type="number" inputmode="decimal"
        placeholder="0" value="${inc[c]||''}"
        onchange="setInc('${m}','${c}',this.value)">
    </div>`).join('');

  const savFields = SAVINGS_CATS.map(c=>`
    <div class="field-row">
      <span class="field-lbl">${c}</span>
      <input class="field-inp" type="number" inputmode="decimal"
        placeholder="0" value="${sav[c]||''}"
        onchange="setSav('${m}','${c}',this.value)">
    </div>`).join('');

  return `
  <div class="card">
    <div class="card-label">Доходы — ${MONTHS[currentMonth]}</div>
    ${incFields}
    <div class="divider"></div>
    <div class="sum-row">
      <span class="sum-lbl">Итого доходов</span>
      <span class="sum-val" style="color:var(--green)">${fmtFull(totalInc(m))} ₽</span>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Накопления</div>
    ${savFields}
    <div class="divider"></div>
    <div class="sum-row">
      <span class="sum-lbl">Итого отложено</span>
      <span class="sum-val" style="color:var(--accent2)">${fmtFull(totalSav(m))} ₽</span>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Вклад — баланс</div>
    <div class="field-row">
      <span class="field-lbl">💰 Текущий остаток</span>
      <input class="field-inp" type="number" inputmode="decimal"
        placeholder="0" value="${dep}"
        onchange="setDep('${m}',this.value)">
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px">
      При «Из вклада» — уменьши баланс вручную
    </div>
  </div>

  <div class="card">
    <div class="card-label">Синхронизация с таблицей</div>
    <button class="btn-sync" onclick="syncSheets()">
      ↑ Записать в Google Sheets
    </button>
    <div class="sync-note" id="sync-note">Данные запишутся в лист 2026, ${MONTHS[currentMonth]}</div>
  </div>`;
}

function setInc(m, cat, val) {
  if (!state.income[m]) state.income[m]={};
  state.income[m][cat] = +val||0;
  saveState(); render();
}
function setSav(m, cat, val) {
  if (!state.savings[m]) state.savings[m]={};
  state.savings[m][cat] = +val||0;
  saveState(); render();
}
function setDep(m, val) { state.deposit[m]=+val||0; saveState(); }

// ── LOG ──────────────────────────────────
function renderLog(m) {
  const exps = [...getExp(m)].reverse();
  if (!exps.length) return `
    <div class="card">
      <div class="empty">
        <div class="empty-icon">📋</div>
        Трат пока нет.<br>Добавь первую во вкладке «+ Трата»
      </div>
    </div>`;

  const items = exps.map((e,i)=>`
    <div class="log-item">
      <div>
        <div class="log-cat">${CATS.find(c=>c.name===e.cat)?.e||'•'} ${e.cat}</div>
        <div class="log-time">${fmtTime(e.time)}</div>
      </div>
      <div style="display:flex;align-items:center">
        <span class="log-amount">${fmtFull(e.amount)} ₽</span>
        <button class="log-del" onclick="delExp('${m}',${exps.length-1-i})">✕</button>
      </div>
    </div>`).join('');

  const total = totalExp(m);
  return `
  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-lbl">Записей</div>
      <div class="kpi-val">${exps.length}</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">Всего трат</div>
      <div class="kpi-val" style="color:var(--red)">${fmt(total)}</div>
    </div>
  </div>
  <div class="card">
    <div class="card-label">Все траты · ${MONTHS[currentMonth]}</div>
    ${items}
  </div>`;
}

function delExp(m, idx) {
  state.expenses[m].splice(idx,1);
  saveState(); render();
  toast('Запись удалена');
}

// ══════════════════════════════════════════
// SYNC
// ══════════════════════════════════════════
async function syncSheets() {
  const m = mk();
  if (APPS_SCRIPT_URL.includes('ВСТАВЬ')) {
    toast('⚠️ Сначала настрой Apps Script URL'); return;
  }
  const note = document.getElementById('sync-note');
  if (note) note.textContent = '⏳ Отправляю...';

  const catMap={};
  getExp(m).forEach(e=>{ catMap[e.cat]=(catMap[e.cat]||0)+e.amount; });

  const payload = {
    action:'writeMonth', month:currentMonth+1, year:2026,
    monthCol: MONTH_COLS[currentMonth],
    expenses: catMap,
    income: getInc(m),
    savings: getSav(m),
    deposit: state.deposit[m]||0,
  };

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method:'POST', body:JSON.stringify(payload),
      headers:{'Content-Type':'application/json'},
    });
    const data = await res.json();
    if (data.success) {
      toast('✅ Записано в Google Sheets!');
      if(note) note.textContent = `Синхр: ${new Date().toLocaleTimeString('ru-RU')}`;
    } else throw new Error(data.error);
  } catch(e) {
    toast('❌ Ошибка: ' + e.message);
    if(note) note.textContent = 'Ошибка синхронизации';
  }
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ══════════════════════════════════════════
// PWA + INIT
// ══════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

document.getElementById('month-sel').value = currentMonth;
loadState();
render();
</script>
</body>
